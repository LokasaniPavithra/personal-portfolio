<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

    <div class="container">

        <div class="header">

            <h1>Admin Dashboard</h1>

            <a href="/logout" class="logout-btn">
                Logout
            </a>

        </div>

        <div class="stats">
            <h2>Total Messages: {{ total_messages }}</h2>
        </div>

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Date & Time</th>
                </tr>
            </thead>

            <tbody>

                {% for msg in messages %}

                <tr>
                    <td>{{ msg.name }}</td>
                    <td>{{ msg.email }}</td>
                    <td>{{ msg.message }}</td>
                    <td>{{ msg.created_at }}</td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>
</html>
